name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pytest pytest-asyncio ruff

      - name: Lint (ruff)
        run: ruff check app/ --select E,F,W --ignore E501

      - name: Type check (imports)
        env:
          SECRET_KEY: ci-test-secret-key-not-real
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB: stockpilot_test
          REDIS_URL: redis://localhost:6379
        run: python -c "from app.main import app; print(f'✓ {len(app.routes)} routes loaded')"

      - name: Unit tests
        env:
          SECRET_KEY: ci-test-secret-key-not-real
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB: stockpilot_test
          REDIS_URL: redis://localhost:6379
        run: python -m pytest tests/unit/ tests/edge_cases/ tests/security/ -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t stockpilot-backend .

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t stockpilot-frontend .
